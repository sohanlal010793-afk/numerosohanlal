services:
  - type: web
    name: numerosohanlal
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: 20
    disk:
      name: kundali-data
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
